<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WireGuard Client Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }

        h1 {
            color: #2c3e50;
        }

        .controls {
            margin-bottom: 20px;
        }

        .server-list {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }

        .server-list th,
        .server-list td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .server-list th {
            background-color: #f2f2f2;
        }

        .btn {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            margin-right: 5px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-success {
            background-color: #27ae60;
        }

        .btn-success:hover {
            background-color: #229954;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 350px;
            border-radius: 5px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        #status {
            margin-top: 20px;
            padding: 10px;
            display: none;
            border-radius: 4px;
        }

        .success {
            background-color: #dff0d8;
            color: #3c763d;
        }

        .error {
            background-color: #f2dede;
            color: #a94442;
        }
    </style>
</head>

<body>

    <h1>VPN Servers</h1>

    <div class="controls">
        <button class="btn btn-success" onclick="showAddServerModal()">Add Server</button>
    </div>

    <table class="server-list" id="serverTable">
        <thead>
            <tr>
                <th>Server Name</th>
                <th>Address</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="status"></div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2 id="loginTitle">Login to Server</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword">
            </div>
            <button class="btn" id="loginBtn" onclick="submitLogin()">Login</button>
        </div>
    </div>

    <!-- Add Server Modal -->
    <div id="addServerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddServerModal()">&times;</span>
            <h2>Add VPN Server</h2>
            <div class="form-group">
                <label>Server Name</label>
                <input type="text" id="serverName">
            </div>
            <div class="form-group">
                <label>Server IP</label>
                <input type="text" id="serverIp">
            </div>
            <div class="form-group">
                <label>Server Port</label>
                <input type="number" id="serverPort" value="3000">
            </div>
            <button class="btn btn-success" onclick="submitAddServer()">Add Server</button>
        </div>
    </div>

    <script>
        let deviceName = '';
        let currentServer = null;
        let currentToken = null;
        window.serverStatus = {};

        // Get device name
        async function fetchDeviceName() {
            try {
                const res = await fetch('/api/client/device-name');
                const data = await res.json();
                if (data.success && data.deviceName) {
                    deviceName = data.deviceName.trim();
                } else {
                    deviceName = 'device';
                }
            } catch (err) {
                console.error('Error fetching device name:', err);
                deviceName = 'device';
            }
        }

        // Load servers from VPN_servers.json
        async function loadServers() {
            try {
                const res = await fetch('/api/client/servers');
                const data = await res.json();
                const tbody = document.querySelector('#serverTable tbody');
                tbody.innerHTML = '';

                if (!data.servers || data.servers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No servers configured. Add one to get started.</td></tr>';
                    return;
                }

                data.servers.forEach(server => {
                    const tokenKey = `token_${server.ip}_${server.port}`;
                    const hasToken = !!localStorage.getItem(tokenKey);
                    const statusKey = `${server.ip}:${server.port}`;
                    const isConnected = window.serverStatus && window.serverStatus[statusKey];
                    const statusText = isConnected ? 'Connected' : 'Disconnected';
                    const statusClass = isConnected ? 'success' : 'error';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${server.name}</td>
                        <td>${server.ip}:${server.port}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>
                            ${hasToken ? `
                                <button class="btn" onclick="enrollDevice('${server.ip}', ${server.port})">Enroll</button>
                                <button class="btn" onclick="connectDevice('${server.ip}', ${server.port})">Connect</button>
                                <button class="btn btn-danger" onclick="disconnect('${server.ip}', ${server.port})">Disconnect</button>
                                <button class="btn btn-danger" onclick="logout('${server.ip}', ${server.port})" style="margin-left: 10px;">Logout</button>
                            ` : `
                                <button class="btn" onclick="showLoginModal('${server.name}', '${server.ip}', ${server.port})">Login</button>
                            `}
                            <button class="btn btn-danger" onclick="deleteServer('${server.ip}', ${server.port})" style="margin-left: 10px;">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                showStatus('Error loading servers: ' + err.message, 'error');
            }
        }

        // Show login modal for specific server
        function showLoginModal(serverName, ip, port) {
            currentServer = { name: serverName, ip, port };
            document.getElementById('loginTitle').innerText = `Login to ${serverName}`;
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginModal').style.display = 'block';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
            currentServer = null;
        }

        // Login to VPN server - get JWT token
        async function submitLogin() {
            if (!currentServer) return alert('No server selected');

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) return alert('Please fill all fields');

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = 'Logging in...';

            try {
                const res = await fetch(`/api/client/login/${currentServer.ip}/${currentServer.port}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!data.success) throw new Error(data.error || 'Login failed');

                // Store token per server
                const tokenKey = `token_${currentServer.ip}_${currentServer.port}`;
                const usernameKey = `username_${currentServer.ip}_${currentServer.port}`;
                localStorage.setItem(tokenKey, data.token);
                localStorage.setItem(usernameKey, username);
                showStatus(`Logged in to ${currentServer.name}`, 'success');
                closeLoginModal();
                await loadServers();
            } catch (err) {
                alert('Login failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        }

        // Get token for specific server
        function getServerToken(ip, port) {
            return localStorage.getItem(`token_${ip}_${port}`);
        }

        // Check connection status via backend
        async function loadConnectionStatus() {
            try {
                const res = await fetch('/api/client/connection-status');
                const data = await res.json();
                // Store status in a map for each server
                window.serverStatus = {};
                data.servers.forEach(s => {
                    window.serverStatus[`${s.ip}:${s.port}`] = s.connected;
                });
                // Reload servers to update display
                await loadServers();
            } catch (err) {
                console.error('Error fetching connection status', err);
            }
        }

        function getServerUsername(ip, port) {
            return localStorage.getItem(`username_${ip}_${port}`);
        }

        // Enroll device
        async function enrollDevice(ip, port) {
            const token = getServerToken(ip, port);
            const username = getServerUsername(ip, port);
            if (!token || !username) return alert('Not logged in');

            try {
                const res = await fetch(`/api/client/enroll/${ip}/${port}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, deviceName })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showStatus('Device enrollment request submitted! Wait for admin approval.', 'success');
            } catch (err) {
                showStatus('Enrollment failed: ' + err.message, 'error');
            }
        }

        // Connect device (enable peer on VPN)
        async function connectDevice(ip, port) {
            const token = getServerToken(ip, port);
            const username = getServerUsername(ip, port);
            if (!token || !username) return alert('Not logged in');

            try {
                const res = await fetch(`/api/client/connect/${ip}/${port}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, deviceName })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                // don't show success message; status will update on reload
                await loadConnectionStatus();
            } catch (err) {
                showStatus('Connection failed: ' + err.message, 'error');
            }
        }

        // Disconnect device
        async function disconnect(ip, port) {
            const token = getServerToken(ip, port);
            const username = getServerUsername(ip, port);
            if (!token || !username) return alert('Not logged in');

            try {
                const res = await fetch(`/api/client/disconnect/${ip}/${port}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ deviceName })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showStatus('Disconnected from VPN', 'success');
            } catch (err) {
                showStatus('Disconnect failed: ' + err.message, 'error');
            }
        }

        // Logout from server
        function logout(ip, port) {
            const tokenKey = `token_${ip}_${port}`;
            const usernameKey = `username_${ip}_${port}`;
            localStorage.removeItem(tokenKey);
            localStorage.removeItem(usernameKey);
            loadServers();
            showStatus('Logged out', 'success');
        }

        // Show add server modal
        function showAddServerModal() {
            document.getElementById('serverName').value = '';
            document.getElementById('serverIp').value = '';
            document.getElementById('serverPort').value = '3000';
            document.getElementById('addServerModal').style.display = 'block';
        }

        function closeAddServerModal() {
            document.getElementById('addServerModal').style.display = 'none';
        }

        // Add server
        async function submitAddServer() {
            const name = document.getElementById('serverName').value;
            const ip = document.getElementById('serverIp').value;
            const port = parseInt(document.getElementById('serverPort').value);

            if (!name || !ip || !port) return alert('Please fill all fields');

            try {
                const res = await fetch('/api/client/servers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, ip, port })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                closeAddServerModal();
                await loadServers();
                showStatus('Server added successfully', 'success');
            } catch (err) {
                alert('Failed to add server: ' + err.message);
            }
        }

        // Delete server
        async function deleteServer(ip, port) {
            if (!confirm(`Delete server ${ip}:${port}?`)) return;

            try {
                const res = await fetch(`/api/client/servers/${ip}/${port}`, { method: 'DELETE' });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                // Clear token for this server
                const tokenKey = `token_${ip}_${port}`;
                const usernameKey = `username_${ip}_${port}`;
                localStorage.removeItem(tokenKey);
                localStorage.removeItem(usernameKey);

                await loadServers();
                showStatus('Server deleted', 'success');
            } catch (err) {
                showStatus('Failed to delete server: ' + err.message, 'error');
            }
        }

        // Show status message
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.style.display = 'block';
            el.className = type;
            el.innerText = msg;
        }

        // Initialize
        (async () => {
            await fetchDeviceName();
            await loadServers();
            await loadConnectionStatus();
        })();
    </script>
</body>

</html>
