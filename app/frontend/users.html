<!DOCTYPE html>
<html>

<head>
    <title>WireGuard VPN Manager - Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .section-title {
            color: rgba(134, 22, 24, 1);
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .simple-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .simple-table th,
        .simple-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
            text-align: left;
        }

        .simple-table th {
            background-color: #fafafa;
            font-weight: 600;
        }

        .simple-table tbody tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        button {
            cursor: pointer;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background-color: rgba(134, 22, 24, 0.8);
            color: white;
            transition: background-color 0.3s;
            font-weight: 500;
            font-size: 0.9rem;
            font-family: inherit;
        }

        button:hover {
            background-color: rgba(134, 22, 24, 1);
        }

        .btn-delete {
            padding: 6px 12px;
            background-color: #dc3545;
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body data-current="users">

    <div id="main-content">
        <h2 class="section-title">Identity</h2>

        <form id="create-user-form">
            <div class="form-group">
                <label for="user-username">Username</label>
                <input type="text" id="user-username" required>
            </div>
            <div class="form-group">
                <label for="user-password">Password</label>
                <input type="password" id="user-password" required>
            </div>
            <div class="form-group">
                <label for="user-expire">Expire Days</label>
                <input type="number" id="user-expire" placeholder="Ex: 90" min="1">
            </div>
            <button type="submit">Create new user</button>
        </form>

        <table class="simple-table" id="users-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Create Day</th>
                    <th>Expire Day</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
        </table>
    </div>

    <script src="/js/navbar.js"></script>
    <script src="/js/users.js"></script>
</body>

</html>
