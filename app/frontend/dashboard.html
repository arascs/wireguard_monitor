<!DOCTYPE html>
<html>

<head>
    <title>WireGuard Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body {
            max-width: 1400px;
            margin: 0 auto;
            padding-top: 80px;
            padding-left: 185px;
        }

        .interface-overview,
        .peers-section,
        .chart-section {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .interface-overview h2,
        .peers-section h2,
        .chart-section h2 {
            margin-top: 0;
            color: rgba(134, 22, 24, 1);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .filter-form {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-form label {
            font-weight: bold;
        }

        .filter-form input {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 2px;
        }

        button {
            cursor: pointer;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: rgba(134, 22, 24, 0.8);
            color: white;
            transition: background-color 0.3s;
            font-weight: 500;
            font-size: 0.95rem;
            font-family: inherit;
        }

        button:hover {
            background-color: rgba(134, 22, 24, 1);
        }

        .interface-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        /* Interface info as a single table */
        .if-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            font-size: 0.9rem;
        }

        .if-table th, .if-table td {
            padding: 8px 12px;
            border: 1px solid #e8e8e8;
            text-align: left;
        }

        .if-table th {
            background: #fafafa;
            color: #666;
            font-weight: 500;
            white-space: nowrap;
            width: 160px;
        }

        .if-table td {
            word-break: break-all;
            font-family: monospace;
            font-size: 0.85rem;
        }

        /* Peers section */
        .peers-search {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .peers-search input {
            flex: 1;
            padding: 7px 11px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .peers-table-wrap {
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }

        .peers-tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .peers-tbl th {
            position: sticky;
            top: 0;
            background: #fafafa;
            color: #555;
            font-weight: 500;
            padding: 9px 12px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
            white-space: nowrap;
        }

        .peers-tbl td {
            padding: 8px 12px;
            border-bottom: 1px solid #f3f3f3;
            vertical-align: middle;
        }

        .peers-tbl tbody tr:hover {
            background: #fafafa;
            cursor: pointer;
        }

        .peer-badge {
            font-size: 0.72em;
            padding: 2px 7px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
        }

        .badge-active   { background-color: #28a745; }
        .badge-inactive { background-color: #6c757d; }
        .badge-disabled { background-color: #dc3545; }

        /* Two charts side by side */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .charts-row { grid-template-columns: 1fr; }
        }

        .peers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }


        .peer-card {
            padding: 20px;
            border-radius: 8px;
            border: none;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .peer-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .peer-card.active {
            border-left: 5px solid #28a745;
        }

        .peer-card.inactive {
            border-left: 5px solid #6c757d;
            opacity: 0.8;
        }

        .peer-card.disabled {
            border-left: 5px solid #dc3545;
            background-color: #f8f9fa;
            opacity: 0.6;
        }

        .peer-name {
            font-size: 1.1em;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .peer-public-key {
            font-size: 0.8em;
            color: #666;
            margin: 5px 0 10px 0;
            font-family: monospace;
            word-break: break-all;
        }

        .peer-badge {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 7px;
            color: white;
            font-weight: bold;
        }

        .badge-active {
            background-color: #28a745;
        }

        .badge-inactive {
            background-color: #6c757d;
        }

        .badge-disabled {
            background-color: #dc3545;
        }

        .peer-throughput {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
        }

        .peer-throughput-item {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .loading,
        .error {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            color: #dc3545;
        }

        /* Log viewer modal overrides */
        #log-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 0;
            border-radius: 10px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            z-index: 3000;
            width: 780px;
            max-width: 95vw;
            max-height: 80vh;
            flex-direction: column;
        }

        #log-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(134, 22, 24, 0.9);
            border-radius: 10px 10px 0 0;
            font-weight: 600;
            font-size: 1rem;
        }

        #log-modal-header span {
            color: white;
        }

        #log-close-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 6px;
            line-height: 1;
            font-weight: bold;
        }

        #log-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        #log-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.82rem;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: calc(80vh - 60px);
            background: #0d0d1a;
            border-radius: 0 0 10px 10px;
        }

        #log-content .log-empty {
            color: #888;
            font-style: italic;
            text-align: center;
            margin-top: 20px;
        }

        #log-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2999;
        }

        .log-view-btn {
            background: rgba(30, 80, 160, 0.85) !important;
            padding: 8px 11px !important;
            font-size: 1rem !important;
            line-height: 1;
            border-radius: 5px;
        }

        .log-view-btn:hover {
            background: rgba(20, 60, 140, 1) !important;
        }
    </style>
</head>

<body data-current="connections">

    <!-- 1. Interface overview -->
    <div class="interface-overview">
        <div id="interface-controls" style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <h2 id="title" style="margin:0;color:rgba(134,22,24,1);"></h2>
            </div>
            <div id="top-buttons" style="display:flex;gap:10px;align-items:center;">
                <span id="iface-status" style="font-weight:bold;color:#666;">Status: ?</span>
                <button id="start-stop-btn">Start</button>
                <button id="edit-interface-btn">Edit Interface</button>
                <button id="view-log-btn" class="log-view-btn" title="View Interface Log">📋</button>
            </div>
        </div>
        <div id="interface-info" class="loading">Loading interface information...</div>
    </div>

    <!-- 2. Peers section -->
    <div class="peers-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h2 style="margin:0;">Peers</h2>
            <button id="add-peer-btn">Add Peer</button>
        </div>
        <div class="peers-search">
            <input type="text" id="peer-search" placeholder="Search by name or IP…" oninput="filterPeersTable()">
        </div>
        <div class="peers-table-wrap">
            <table class="peers-tbl" id="peers-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Allowed IPs</th>
                        <th>Endpoint</th>
                        <th>Last Handshake</th>
                        <th>RX / TX</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="peers-tbody">
                    <tr><td colspan="7" class="loading">Loading peers...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- hidden container still needed by JS event delegation -->
        <div id="peers-container" style="display:none;"></div>
    </div>

    <!-- 3. Charts section (cuối cùng) -->
    <div class="chart-section">
        <h2>Interface Statistics</h2>
        <div class="filter-form">
            <label>From: <input type="date" id="startDate"></label>
            <label>To: <input type="date" id="endDate"></label>
            <button id="applyFilter">Apply Filter</button>
            <button id="clearFilter">Clear</button>
        </div>
        <div class="charts-row">
            <div id="rxSpeedChart" style="height:300px;"></div>
            <div id="txSpeedChart" style="height:300px;"></div>
        </div>
        <div class="charts-row">
            <div id="rxDropRateChart" style="height:250px;"></div>
            <div id="txDropRateChart" style="height:250px;"></div>
        </div>
    </div>

    <!-- edit interface modal -->
    <div id="edit-interface-modal" class="modal">
        <div class="modal-content"
            style="max-width:500px; width:100%; max-height:80vh; overflow-y:auto; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); margin:0;">
            <h3>Edit Interface</h3>
            <form id="edit-interface-form">
                <div style="margin-bottom:10px;"><label>Address:</label><input type="text" id="edit-if-address"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>Listen Port:</label><input type="text" id="edit-if-port"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>DNS:</label><input type="text" id="edit-if-dns"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>MTU:</label><input type="text" id="edit-if-mtu"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>PreUp:</label><input type="text" id="edit-if-preup"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>PostUp:</label><input type="text" id="edit-if-postup"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>PreDown:</label><input type="text" id="edit-if-predown"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>PostDown:</label><input type="text" id="edit-if-postdown"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <button type="button" id="edit-if-generate-keys" style="margin-bottom:10px;">Generate new key
                    pair</button>
                <div id="edit-if-keys-output" style="margin-bottom:15px;"></div>
                <div style="text-align:right;">
                    <button type="button" id="cancel-edit-if"
                        style="margin-right:10px; background:none; border:1px solid #bbb; color:#555; padding:7px 16px; border-radius:5px; cursor:pointer;">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- log backdrop -->
    <div id="log-backdrop"></div>

    <!-- log viewer modal -->
    <div id="log-modal">
        <div id="log-modal-header">
            <span id="log-modal-title">Interface Log</span>
            <button id="log-close-btn" title="Close">&times;</button>
        </div>
        <div id="log-content"><span class="log-empty">Loading...</span></div>
    </div>

    <!-- add peer modal -->
    <div id="add-peer-modal" class="modal">
        <div class="modal-content"
            style="max-width:500px; width:100%; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); margin:0;">
            <h3>Add New Peer</h3>
            <form id="add-peer-form">
                <div style="margin-bottom:10px;"><label>Name:</label><input type="text" id="new-peer-name"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>Public Key:</label><input type="text" id="new-peer-publicKey"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>Endpoint:</label><input type="text" id="new-peer-endpoint"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"></div>
                <div style="margin-bottom:10px;"><label>Allowed IPs:</label><input type="text" id="new-peer-allowedIPs"
                        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;" value="0.0.0.0/0"></div>
                <div style="margin-bottom:10px;"><label>Persistent Keepalive:</label><input type="text"
                        id="new-peer-keepalive" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;"
                        value="25"></div>
                <div style="margin-bottom:10px;"><label><input type="checkbox" id="new-peer-generatePsk"> Generate
                        PSK</label></div>
                <div style="text-align:right;">
                    <button type="button" id="cancel-add-peer"
                        style="margin-right:10px; background:none; border:1px solid #bbb; color:#555; padding:7px 16px; border-radius:5px; cursor:pointer;">Cancel</button>
                    <button type="submit">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/navbar.js"></script>
    <script src="/js/dashboard_page.js"></script>
</body>

</html>
