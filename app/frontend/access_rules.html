<!DOCTYPE html>
<html>

<head>
    <title>WireGuard VPN Manager - Access rules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .section-title {
            color: rgba(134, 22, 24, 1);
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .simple-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .simple-table th,
        .simple-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
            text-align: left;
        }

        .simple-table th {
            background-color: #fafafa;
            font-weight: 600;
        }

        .simple-table tbody tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        button {
            cursor: pointer;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background-color: rgba(134, 22, 24, 0.8);
            color: white;
            transition: background-color 0.3s;
            font-weight: 500;
            font-size: 0.9rem;
            font-family: inherit;
        }

        button:hover {
            background-color: rgba(134, 22, 24, 1);
        }

        .btn {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-danger {
            background-color: #dc3545;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body data-current="access">

    <div id="main-content">
        <h2 class="section-title">Access rules</h2>

        <form id="create-rule-form">
            <div class="form-group">
                <label for="rule-name">Name</label>
                <input type="text" id="rule-name" required>
            </div>
            <div class="form-group">
                <label for="rule-source-type">Source type</label>
                <select id="rule-source-type" required>
                    <option value="site">Site</option>
                    <option value="device">Device</option>
                    <option value="interface">Interface</option>
                    <option value="ip">IP</option>
                </select>
            </div>
            <div class="form-group" id="rule-source-site-group">
                <label for="rule-site-id">Site</label>
                <select id="rule-site-id"></select>
            </div>
            <div class="form-group" id="rule-source-device-group" style="display:none;">
                <label for="rule-device-id">Device</label>
                <select id="rule-device-id"></select>
            </div>
            <div class="form-group" id="rule-source-interface-group" style="display:none;">
                <label for="rule-interface-name">Interface</label>
                <select id="rule-interface-name"></select>
            </div>
            <div class="form-group" id="rule-source-ip-group" style="display:none;">
                <label for="rule-source-ip">Source IP</label>
                <input type="text" id="rule-source-ip">
            </div>
            <div class="form-group">
                <label for="rule-application-id">Destination application</label>
                <select id="rule-application-id" required></select>
            </div>
            <div class="form-group">
                <label for="rule-action">Action</label>
                <select id="rule-action" required>
                    <option value="allow">allow</option>
                    <option value="block">block</option>
                </select>
            </div>
            <button type="submit">Create new rule</button>
        </form>

        <table class="simple-table" id="rules-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Source</th>
                    <th>Destination</th>
                    <th>Action</th>
                    <th>Status</th>
                    <th>Toggle</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="rules-tbody"></tbody>
        </table>
    </div>

    <script src="/js/navbar.js"></script>
    <script src="/js/access_rules.js"></script>
</body>

</html>
