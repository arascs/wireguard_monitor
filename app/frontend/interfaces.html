<!DOCTYPE html>
<html>

<head>
    <title>WireGuard VPN Manager - Interfaces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: rgba(134, 22, 24, 1);
        }

        button {
            cursor: pointer;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: rgba(134, 22, 24, 0.8);
            color: white;
            transition: background-color 0.3s;
            font-weight: 500;
            font-size: 1rem;
            font-family: inherit;
        }

        button:hover {
            background-color: rgba(134, 22, 24, 1);
        }

        .actions {
            margin-top: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions h2 {
            color: rgba(134, 22, 24, 1);
        }

        .interfaces-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }

        .interface-card {
            border: none;
            border-radius: 8px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.3s;
        }

        .interface-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .interface-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: rgba(134, 22, 24, 1);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .interface-card p {
            margin: 6px 0;
            font-size: 0.95em;
            word-break: break-all;
        }

        .interface-status {
            font-weight: bold;
        }

        .interface-status.connected {
            color: #28a745;
        }

        .interface-status.disconnected {
            color: #dc3545;
        }

        #add-interface-btn {
            background-color: rgba(134, 22, 24, 0.9);
        }

        .interface-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .interface-buttons button {
            flex: 1;
            min-width: 0;
        }

        #interfaces-empty {
            margin-top: 30px;
            text-align: center;
            color: #666;
        }

        .section-title {
            color: rgba(134, 22, 24, 1);
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 0.95rem;
            font-family: inherit;
        }

        /* Modal overrides for interfaces page */
        .modal-content {
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }
    </style>
</head>

<body data-current="connections">

    <div id="main-content">
        <div>
            <div class="actions">
                <div>
                    <h2>Interfaces</h2>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="sync-keys-btn">Synchronize keys</button>
                    <button id="add-interface-btn">Add Interface</button>
                </div>
            </div>

            <div id="interfaces-empty" style="display: none;">
                <p>Chưa có interface nào trong /etc/wireguard.</p>
            </div>

            <div id="interfaces-container" class="interfaces-wrapper"></div>
        </div>
    </div>

    <!-- Add interface modal -->
    <div id="add-interface-modal" class="modal">
        <div class="modal-content" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;">
            <h3>Add Interface</h3>
            <form id="add-interface-form">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="new-interface-name" required>
                </div>
                <div class="form-group">
                    <label>Type:</label>
                    <select id="new-interface-type">
                        <option value="Client">Client</option>
                        <option value="Site">Site</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Address (optional):</label>
                    <input type="text" id="new-interface-address">
                </div>
                <div class="form-group">
                    <label>Listen Port (optional):</label>
                    <input type="text" id="new-interface-listenPort">
                </div>
                <div class="form-group">
                    <label>DNS (optional):</label>
                    <input type="text" id="new-interface-dns">
                </div>
                <div class="form-group">
                    <label>MTU (optional):</label>
                    <input type="text" id="new-interface-mtu">
                </div>
                <div class="form-group">
                    <label>PreUp command (optional):</label>
                    <input type="text" id="new-interface-preUp">
                </div>
                <div class="form-group">
                    <label>PostUp command (optional):</label>
                    <input type="text" id="new-interface-postUp">
                </div>
                <div class="form-group">
                    <label>PreDown command (optional):</label>
                    <input type="text" id="new-interface-preDown">
                </div>
                <div class="form-group">
                    <label>PostDown command (optional):</label>
                    <input type="text" id="new-interface-postDown">
                </div>
                <div class="modal-buttons">
                    <button type="button" id="cancel-add-interface">Cancel</button>
                    <button type="submit">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/navbar.js"></script>
    <script src="/js/interfaces_home.js"></script>
</body>

</html>
