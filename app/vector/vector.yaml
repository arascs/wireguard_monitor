data_dir: /var/lib/vector

sources:
  json_logs:
    type: file
    include:
      - /etc/wireguard/logs/endpoint_events.json
    read_from: beginning

  vector_internal_logs:
    type: internal_logs

transforms:
  parse_and_clean:
    type: remap
    inputs:
      - json_logs
    source: |
      parsed, err = parse_json(.message)
      if err == null {
          . = parsed
      }

      .origin_host = get_hostname!()
      .ingest_timestamp = now()

  format_vector_errors:
    type: remap
    inputs:
      - vector_internal_logs
    source: |
      if .level != "error" {
        drop()
      }

      if !exists(.component_id) {
        drop()
      }

      . = {
        "timestamp": to_string(now()),
        "event_name": "vector_error",
        "details": {
          "component": .component_id ?? "unknown",
          "message": .message ?? "",
          "error_type": .error_type ?? "",
          "stage": .stage ?? ""
        }
      }

sinks:
  out:
    type: console
    inputs:
      - parse_and_clean
    encoding:
      codec: json

  to_central_backend:
    type: http
    inputs:
      - parse_and_clean
    uri: "https://160.250.65.230:4001/api/logs/push"
    method: post

    encoding:
      codec: json

    headers:
      Content-Type: application/json
      X-Push-API-Key: "hungnlq_push"

    batch:
      max_events: 20
      timeout_secs: 2

    request:
      timeout_secs: 5
      retry_attempts: 5

    tls:
      enabled: true
      verify_certificate: false
      verify_hostname: false

  to_local_backend:
    type: http
    inputs:
      - parse_and_clean
    uri: "https://localhost:3000/api/notifications/ingest"
    method: post

    encoding:
      codec: json

    headers:
      Content-Type: application/json
      X-Push-API-Key: "hungnlq_push"

    batch:
      max_events: 10
      timeout_secs: 1

    request:
      timeout_secs: 5
      retry_attempts: 3

    tls:
      verify_hostname: false
      verify_certificate: false

  vector_error_to_file:
    type: file
    inputs:
      - format_vector_errors
    path: "/var/log/vector/vector_errors.json"
    encoding:
      codec: json